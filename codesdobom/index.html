<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tetris</title>
  <style>
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: sans-serif;
    }
    canvas {
      border: 2px solid white;
      background: black;
    }
  </style>
</head>
<body>
  <canvas id="game" width="240" height="400"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const COLS = 10;
    const ROWS = 20;
    const BLOCK = 20;

    ctx.scale(BLOCK, BLOCK);

    const SHAPES = [
      [[1, 1, 1, 1]],                 // I
      [[1, 1], [1, 1]],               // O
      [[0, 1, 0], [1, 1, 1]],         // T
      [[1, 0, 0], [1, 1, 1]],         // L
      [[0, 0, 1], [1, 1, 1]],         // J
      [[0, 1, 1], [1, 1, 0]],         // S
      [[1, 1, 0], [0, 1, 1]]          // Z
    ];

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    const board = createBoard();

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            ctx.fillStyle = "cyan";
            ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
          }
        });
      });
    }

    function collide(board, player) {
      const m = player.matrix;
      const o = player.pos;
      for (let y = 0; y < m.length; y++) {
        for (let x = 0; x < m[y].length; x++) {
          if (
            m[y][x] &&
            (board[y + o.y] &&
             board[y + o.y][x + o.x]) !== 0
          ) {
            return true;
          }
        }
      }
      return false;
    }

    function merge(board, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value) {
            board[y + player.pos.y][x + player.pos.x] = 1;
          }
        });
      });
    }

    function rotate(matrix) {
      return matrix[0].map((_, i) =>
        matrix.map(row => row[i]).reverse()
      );
    }

    function clearLines() {
      for (let y = board.length - 1; y >= 0; y--) {
        if (board[y].every(v => v !== 0)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(0));
        }
      }
    }

    function drop() {
      player.pos.y++;
      if (collide(board, player)) {
        player.pos.y--;
        merge(board, player);
        clearLines();
        resetPlayer();
      }
      dropCounter = 0;
    }

    function resetPlayer() {
      player.matrix = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      player.pos.y = 0;
      player.pos.x =
        (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);
      if (collide(board, player)) {
        board.forEach(row => row.fill(0));
      }
    }

    const player = {
      pos: { x: 0, y: 0 },
      matrix: null
    };

    resetPlayer();

    let dropCounter = 0;
    let dropInterval = 500;
    let lastTime = 0;

    function update(time = 0) {
      const deltaTime = time - lastTime;
      lastTime = time;
      dropCounter += deltaTime;
      if (dropCounter > dropInterval) drop();
      draw();
      requestAnimationFrame(update);
    }

    function draw() {
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawMatrix(board, { x: 0, y: 0 });
      drawMatrix(player.matrix, player.pos);
    }

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") player.pos.x--;
      if (e.key === "ArrowRight") player.pos.x++;
      if (e.key === "ArrowDown") drop();
      if (e.key === "ArrowUp") {
        const rotated = rotate(player.matrix);
        const old = player.matrix;
        player.matrix = rotated;
        if (collide(board, player)) player.matrix = old;
      }
      if (e.key === " ") {
        while (!collide(board, player)) player.pos.y++;
        player.pos.y--;
        drop();
      }
    });

    update();
  </script>
</body>
</html>
